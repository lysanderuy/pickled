name: PR Description

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]
  issue_comment:
    types: [created]

jobs:
  describe_pr:
    if: >
      github.event.sender.type != 'Bot' &&
      (
        github.event_name != 'issue_comment' ||
        (
          github.event.issue.pull_request &&
          startsWith(github.event.comment.body, '/describe')
        )
      )
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
      contents: read
    concurrency:
      group: pr-description-${{ github.event.pull_request.number || github.event.issue.number }}
      cancel-in-progress: true

    steps:
      - name: Resolve PR number
        id: pr
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "issue_comment" ]; then
            echo "number=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
          else
            echo "number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate and update PR description
        uses: actions/github-script@v7
        env:
          GEMINI_API_KEY: ${{ secrets.GEM_KEY }}
          GEMINI_MODEL: gemini-2.5-flash
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            if (!process.env.GEMINI_API_KEY) {
              core.setFailed('Missing GEM_KEY secret.');
              return;
            }

            const prNumber = Number(process.env.PR_NUMBER);
            const model = process.env.GEMINI_MODEL || 'gemini-2.5-flash';
            const { owner, repo } = context.repo;

            const pr = (await github.rest.pulls.get({
              owner,
              repo,
              pull_number: prNumber,
            })).data;

            const files = await github.paginate(
              github.rest.pulls.listFiles,
              {
                owner,
                repo,
                pull_number: prNumber,
                per_page: 100,
              }
            );

            const MAX_PATCH_CHARS = 12000;
            let remainingPatchChars = MAX_PATCH_CHARS;

            const fileSummary = files.map((file) => {
              let summary = `- ${file.filename} (${file.status}, +${file.additions}/-${file.deletions})`;

              if (file.patch && remainingPatchChars > 0) {
                const patchSnippet = file.patch.slice(0, remainingPatchChars);
                remainingPatchChars -= patchSnippet.length;
                summary += `\n\`\`\`diff\n${patchSnippet}\n\`\`\``;
              }

              return summary;
            }).join('\n\n');

            const requiredHeadings = [
              '## What does this PR do?',
              '## Why did you choose this solution?',
              '## What is the dependency graph of the changes?',
              '## How to test/verify?',
            ];

            const prompt = [
              'Write a pull request description from the PR metadata and diff below.',
              'Return Markdown only. Use exactly these headings and in this order:',
              ...requiredHeadings,
              '',
              'Rules:',
              '- Do not add any extra top-level sections.',
              '- Never wrap the response in code fences (no ```markdown).',
              '- For the first three sections, use bullet points only (`- `). Do not use paragraphs.',
              '- For the "How to test/verify?" section, use numbered steps only (`1.`, `2.`, ...).',
              '- Keep it concrete and specific to the actual code changes.',
              '- Keep the writing concise and professional.',
              '- If dependency impact is minimal, explicitly say so in the dependency graph section.',
              '- If testing is not present, say what was not tested and why.',
              '',
              `PR Title: ${pr.title}`,
              `Base: ${pr.base.ref}`,
              `Head: ${pr.head.ref}`,
              '',
              'Existing PR Description:',
              pr.body || '(empty)',
              '',
              'Changed files and patches:',
              fileSummary || '(no changed files)',
            ].join('\n');

            const response = await fetch(
              `https://generativelanguage.googleapis.com/v1beta/models/${encodeURIComponent(model)}:generateContent?key=${process.env.GEMINI_API_KEY}`,
              {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  generationConfig: {
                    temperature: 0.2,
                  },
                  contents: [
                    {
                      role: 'user',
                      parts: [{ text: prompt }],
                    },
                  ],
                }),
              }
            );

            if (!response.ok) {
              const errText = await response.text();
              core.setFailed(`Gemini API error (${response.status}): ${errText.slice(0, 600)}`);
              return;
            }

            const data = await response.json();
            const generated = data?.candidates?.[0]?.content?.parts?.map((p) => p.text || '').join('\n').trim();

            if (!generated) {
              core.setFailed('Gemini returned an empty response.');
              return;
            }

            const stripOuterCodeFence = (text) => {
              const trimmed = text.trim();
              const fenceMatch = trimmed.match(/^```(?:markdown|md)?\s*[\r\n]([\s\S]*?)\s*```$/i);
              return fenceMatch ? fenceMatch[1].trim() : trimmed;
            };

            let cleaned = stripOuterCodeFence(generated);

            const missingHeadings = requiredHeadings.filter((heading) => !cleaned.includes(heading));
            if (missingHeadings.length > 0) {
              core.setFailed(`Generated description missing required headings: ${missingHeadings.join(', ')}`);
              return;
            }

            const getSectionBody = (markdown, heading, nextHeading) => {
              const start = markdown.indexOf(heading);
              if (start < 0) return '';
              const sectionStart = start + heading.length;
              const end = nextHeading ? markdown.indexOf(nextHeading, sectionStart) : markdown.length;
              return markdown.slice(sectionStart, end < 0 ? markdown.length : end).trim();
            };

            const replaceSectionBody = (markdown, heading, nextHeading, newBody) => {
              const start = markdown.indexOf(heading);
              if (start < 0) return markdown;
              const sectionStart = start + heading.length;
              const end = nextHeading ? markdown.indexOf(nextHeading, sectionStart) : markdown.length;
              const safeEnd = end < 0 ? markdown.length : end;
              return `${markdown.slice(0, sectionStart)}\n\n${newBody}\n\n${markdown.slice(safeEnd).trimStart()}`.trim();
            };

            const firstSectionBody = getSectionBody(cleaned, requiredHeadings[0], requiredHeadings[1]);
            const secondSectionBody = getSectionBody(cleaned, requiredHeadings[1], requiredHeadings[2]);
            const thirdSectionBody = getSectionBody(cleaned, requiredHeadings[2], requiredHeadings[3]);
            const testSectionBody = getSectionBody(cleaned, requiredHeadings[3], null);

            const hasBulletOnly = (text) => {
              const lines = text
                .split('\n')
                .map((line) => line.trim())
                .filter(Boolean);
              return lines.length > 0 && lines.every((line) => line.startsWith('- '));
            };

            const hasNumberedStepsOnly = (text) => {
              const lines = text
                .split('\n')
                .map((line) => line.trim())
                .filter(Boolean);
              return lines.length > 0 && lines.every((line) => /^\d+\.\s+/.test(line));
            };

            const toNumberedSteps = (text) => {
              const lines = text
                .split('\n')
                .map((line) => line.trim())
                .filter(Boolean);
              if (lines.length === 0) {
                return ['1. Not tested (no verification steps were generated).'];
              }

              const normalized = lines.map((line) => line.replace(/^(\d+[\.\)]\s+|[-*]\s+)/, '').trim());
              return normalized.map((line, index) => `${index + 1}. ${line}`);
            };

            const bulletViolations = [];
            if (!hasBulletOnly(firstSectionBody)) bulletViolations.push(requiredHeadings[0]);
            if (!hasBulletOnly(secondSectionBody)) bulletViolations.push(requiredHeadings[1]);
            if (!hasBulletOnly(thirdSectionBody)) bulletViolations.push(requiredHeadings[2]);
            if (bulletViolations.length > 0) {
              core.setFailed(`Generated description must use bullet points only in: ${bulletViolations.join(', ')}`);
              return;
            }

            if (!hasNumberedStepsOnly(testSectionBody)) {
              const rewrittenSteps = toNumberedSteps(testSectionBody).join('\n');
              cleaned = replaceSectionBody(cleaned, requiredHeadings[3], null, rewrittenSteps);
            }

            const finalTestSectionBody = getSectionBody(cleaned, requiredHeadings[3], null);
            if (!hasNumberedStepsOnly(finalTestSectionBody)) {
              core.setFailed(`Generated description must use numbered steps only in: ${requiredHeadings[3]}`);
              return;
            }

            await github.rest.pulls.update({
              owner,
              repo,
              pull_number: prNumber,
              body: cleaned,
            });

            core.info(`Updated PR #${prNumber} description.`);

            if (context.eventName === 'issue_comment') {
              try {
                await github.rest.reactions.createForIssueComment({
                  owner,
                  repo,
                  comment_id: context.payload.comment.id,
                  content: 'rocket',
                });
              } catch (error) {
                core.warning(`Description updated, but reacting to the comment failed: ${error.message}`);
              }
            }
